# =========================================================================
# GITHUB ACTIONS: ENTERPRISE DEPLOYMENT PIPELINE (CI/CD)
# =========================================================================
name: Deploy Azure Data Factory

on:
  push:
    branches:
      - main # Triggers automatically when code is merged to main branch

jobs:
  deploy-adf:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the source code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Log in to your Azure Account using a Service Principal
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Deploy the ADF ARM Templates directly to your Azure Service
      - name: Deploy ADF Resources
        uses: Azure/datafactory-deploy-action@v1.2.0
        with:
          resourceGroupName: 'rg-dream-analyst-prod'
          dataFactoryName: 'adf-dream-analytics-prod2'
          filter: '*' # Deploys all resources (pipelines, datasets, triggers)
          # Overwrite the parameters dynamically for Production! [10, 14]
          parameters: >
            ls_adf_databricks_properties_typeProperties_existingClusterId="0620-211351-7pmnjgde"
